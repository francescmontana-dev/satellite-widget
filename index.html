<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satèl·lit en temps real</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.panel {
  background: #111a2b;
  border-radius: 14px;
  padding: 10px;
}

/* VIDEO FIX */
.video-wrapper {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  overflow: hidden;
  border-radius: 10px;
}

.video-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

img {
  width: 100%;
  border-radius: 10px;
  display: none;
}

button {
  margin: 8px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #1e88e5;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>🌍 Satèl·lit en temps real</h2>

  <div class="panel">

    <!-- VIDEO -->
    <div class="video-wrapper" id="videoBox">
      <iframe src="https://www.youtube.com/embed/KkLs5xkL_6Y" allowfullscreen></iframe>
    </div>

    <!-- IMAGE -->
    <img id="imgSat"
      src="https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg">

    <div>
      <button onclick="showVideo()">🎥 Vídeo</button>
      <button onclick="showImage()">🛰️ Imatge</button>
    </div>

  </div>
</div>

<script>
const img = document.getElementById("imgSat");
const video = document.getElementById("videoBox");

const base = "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg";

setInterval(() => {
  img.src = base + "?t=" + Date.now();
}, 600000);

function showVideo() {
  video.style.display = "block";
  img.style.display = "none";
}

function showImage() {
  video.style.display = "none";
  img.style.display = "block";
}
</script>

</body>
</html>
