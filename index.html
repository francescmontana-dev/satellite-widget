<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo widget</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.panel {
  background: #111a2b;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 16px;
}

.video-wrapper {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  overflow: hidden;
  border-radius: 10px;
}

.video-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

.main-image {
  width: 100%;
  border-radius: 10px;
  display: none;
}

button {
  margin: 8px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #1e88e5;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.tabs {
  margin-top: 10px;
}

.tab {
  background: #394b6a;
  border: none;
  padding: 8px 12px;
  margin: 4px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.tab.active {
  background: #1e88e5;
}

.radar-box {
  border-radius: 10px;
  overflow: hidden;
  background: #0f1728;
}

#radarImg {
  width: 100%;
  display: block;
  border-radius: 10px;
}

.small {
  color: #b8c7e6;
  font-size: 14px;
  margin-top: 8px;
}

.status {
  color: #b8c7e6;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">

  <div class="panel">
    <h2>🌍 Satèl·lit en temps real</h2>

    <div class="video-wrapper" id="videoBox">
      <iframe
        src="https://www.youtube.com/embed/KkLs5xkL_6Y"
        title="EUMETSAT Earth View"
        allowfullscreen>
      </iframe>
    </div>

    <img
      id="imgSat"
      class="main-image"
      src="https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg"
      alt="Satèl·lit EUMETSAT">

    <div>
      <button type="button" onclick="showVideo()">🎥 Vídeo</button>
      <button type="button" onclick="showImage()">🛰️ Imatge</button>
    </div>

    <div class="tabs">
      <button type="button" id="btn-natural" class="tab active" onclick="setImage('natural')">Natural</button>
      <button type="button" id="btn-airmass" class="tab" onclick="setImage('airmass')">Airmass</button>
      <button type="button" id="btn-dust" class="tab" onclick="setImage('dust')">Dust</button>
    </div>
  </div>

  <div class="panel">
    <h2>🌧️ Radar El Masnou</h2>
    <div class="radar-box">
      <img id="radarImg" alt="Radar RainViewer centrat a El Masnou">
    </div>
    <div class="status" id="radarStatus">Carregant radar...</div>
    <div class="small">Widget radar centrat a El Masnou</div>
  </div>

</div>

<script>
/* ---------- SATÈL·LIT ---------- */
const img = document.getElementById("imgSat");
const video = document.getElementById("videoBox");

let current = "natural";

const satUrls = {
  natural: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg",
  airmass: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBAirmass_WesternEurope.jpg",
  dust: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBDust_WesternEurope.jpg"
};

function showVideo() {
  video.style.display = "block";
  img.style.display = "none";
}

function showImage() {
  video.style.display = "none";
  img.style.display = "block";
  img.src = satUrls[current] + "?t=" + Date.now();
}

function setImage(type) {
  current = type;
  document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
  const active = document.getElementById("btn-" + type);
  if (active) active.classList.add("active");
  showImage();
}

setInterval(() => {
  if (img.style.display !== "none") {
    img.src = satUrls[current] + "?t=" + Date.now();
  }
}, 600000);

/* ---------- RADAR WIDGET ---------- */
const radarImg = document.getElementById("radarImg");
const radarStatus = document.getElementById("radarStatus");

// El Masnou
const radarLat = 41.4809;
const radarLon = 2.3190;

// RainViewer permet widgets per coordenades. Zoom màxim: 7.
const radarZoom = 6;
const radarSize = 512;
const radarColor = 2;   // Universal Blue
const radarOptions = "1_1";

async function loadRadarWidget() {
  try {
    radarStatus.textContent = "Carregant radar...";

    const response = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    if (!response.ok) {
      throw new Error("API no disponible");
    }

    const data = await response.json();
    const frames = data && data.radar && data.radar.past ? data.radar.past : [];

    if (!frames.length) {
      throw new Error("Sense frames radar");
    }

    const latest = frames[frames.length - 1];

    const radarUrl =
      data.host +
      latest.path +
      "/" + radarSize +
      "/" + radarZoom +
      "/" + radarLat +
      "/" + radarLon +
      "/" + radarColor +
      "/" + radarOptions + ".png?t=" + Date.now();

    radarImg.src = radarUrl;

    const date = new Date(latest.time * 1000);
    radarStatus.textContent =
      "Radar actualitzat: " +
      date.toLocaleString("ca-ES", {
        dateStyle: "short",
        timeStyle: "medium",
        timeZone: "UTC"
      }) +
      " UTC";
  } catch (error) {
    console.error(error);
    radarStatus.textContent = "No s'ha pogut carregar el radar.";
  }
}

loadRadarWidget();
setInterval(loadRadarWidget, 600000);
</script>

</body>
</html>
