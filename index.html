<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo widget</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.panel {
  background: #111a2b;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 16px;
}

.video-wrapper {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  overflow: hidden;
  border-radius: 10px;
}

.video-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

img {
  width: 100%;
  border-radius: 10px;
  display: none;
}

button {
  margin: 8px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #1e88e5;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.tabs {
  margin-top: 10px;
}

.tab {
  background: #394b6a;
  border: none;
  padding: 8px 12px;
  margin: 4px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.tab.active {
  background: #1e88e5;
}

.small {
  color: #b8c7e6;
  font-size: 14px;
  margin-top: 8px;
}

#radarMap {
  width: 100%;
  height: 620px;
  border-radius: 10px;
  overflow: hidden;

}

.leaflet-container {
  background: #0f1728;
}

.status {
  margin-top: 8px;
  color: #b8c7e6;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">

  <div class="panel">
    <h2>🌍 Satèl·lit en temps real</h2>

    <div class="video-wrapper" id="videoBox">
      <iframe
        src="https://www.youtube.com/embed/KkLs5xkL_6Y"
        title="EUMETSAT Earth View"
        allowfullscreen>
      </iframe>
    </div>

    <img
      id="imgSat"
      src="https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg"
      alt="Satèl·lit EUMETSAT">

    <div>
      <button onclick="showVideo()">🎥 Vídeo</button>
      <button onclick="showImage()">🛰️ Imatge</button>
    </div>

    <div class="tabs">
      <button id="btn-natural" class="tab active" onclick="setImage('natural')">Natural</button>
      <button id="btn-airmass" class="tab" onclick="setImage('airmass')">Airmass</button>
      <button id="btn-dust" class="tab" onclick="setImage('dust')">Dust</button>
    </div>
  </div>

  <div class="panel">
  <h2>🌧️ Radar PRO</h2>
  <div id="radarMap"></div>
  <div class="status" id="radarStatus">Carregant radar...</div>
</div>

</div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin="">
</script>

<script>
/* ---------- SATÈL·LIT ---------- */
const img = document.getElementById("imgSat");
const video = document.getElementById("videoBox");

let current = "natural";

const urls = {
  natural: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg",
  airmass: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBAirmass_WesternEurope.jpg",
  dust: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBDust_WesternEurope.jpg"
};

function showVideo() {
  video.style.display = "block";
  img.style.display = "none";
}

function showImage() {
  video.style.display = "none";
  img.style.display = "block";
  img.src = urls[current] + "?t=" + Date.now();
}

function setImage(type) {
  current = type;
  document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + type).classList.add("active");
  showImage();
}

setInterval(() => {
  if (img.style.display !== "none") {
    img.src = urls[current] + "?t=" + Date.now();
  }
}, 600000);

/* ---------- RADAR PRO ---------- */
c<script>
const radarStatus = document.getElementById("radarStatus");
const elMasnou = [41.4809, 2.3190];

const map = L.map("radarMap", {
  zoomControl: true,
  maxZoom: 7
}).setView(elMasnou, 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors",
  maxZoom: 19
}).addTo(map);

L.marker(elMasnou).addTo(map).bindPopup("El Masnou");

let radarLayer = null;

async function loadRadar() {
  try {
    radarStatus.textContent = "Carregant radar...";

    const response = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    if (!response.ok) throw new Error("API RainViewer no disponible");

    const data = await response.json();
    const frames = data?.radar?.past || [];
    if (!frames.length) throw new Error("Sense frames radar");

    const latest = frames[frames.length - 1];

    // Universal Blue = 2
    const tileUrl = `${data.host}${latest.path}/256/{z}/{x}/{y}/2/1_1.png`;

    if (radarLayer) {
      map.removeLayer(radarLayer);
    }

    radarLayer = L.tileLayer(tileUrl, {
      tileSize: 256,
      opacity: 0.65,
      maxNativeZoom: 7,
      maxZoom: 7,
      zIndex: 500,
      attribution: "Radar: RainViewer"
    });

    radarLayer.addTo(map);

    const date = new Date(latest.time * 1000);
    radarStatus.textContent =
      "Radar actualitzat: " +
      date.toLocaleString("ca-ES", {
        dateStyle: "short",
        timeStyle: "medium",
        timeZone: "UTC"
      }) +
      " UTC";
  } catch (err) {
    console.error(err);
    radarStatus.textContent = "No s'ha pogut carregar el radar.";
  }
}

loadRadar();
setInterval(loadRadar, 600000);
</script>

</body>
</html>
