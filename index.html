<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo widget</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.panel {
  background: #111a2b;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 16px;
}

.video-wrapper,
.map-wrapper {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  overflow: hidden;
  border-radius: 10px;
}

.video-wrapper iframe,
.map-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

img {
  width: 100%;
  border-radius: 10px;
  display: none;
}

button {
  margin: 8px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #1e88e5;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.tabs {
  margin-top: 10px;
}

.tab {
  background: #394b6a;
  border: none;
  padding: 8px 12px;
  margin: 4px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.tab.active {
  background: #1e88e5;
}

.small {
  color: #b8c7e6;
  font-size: 14px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="panel">
    <h2>🌍 Satèl·lit en temps real</h2>

    <div class="video-wrapper" id="videoBox">
      <iframe
        src="https://www.youtube.com/embed/KkLs5xkL_6Y"
        title="EUMETSAT Earth View"
        allowfullscreen>
      </iframe>
    </div>

    <img
      id="imgSat"
      src="https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg"
      alt="Satèl·lit EUMETSAT">

    <div>
      <button onclick="showVideo()">🎥 Vídeo</button>
      <button onclick="showImage()">🛰️ Imatge</button>
    </div>

    <div class="tabs">
      <button id="btn-natural" class="tab active" onclick="setImage('natural')">Natural</button>
      <button id="btn-airmass" class="tab" onclick="setImage('airmass')">Airmass</button>
      <button id="btn-dust" class="tab" onclick="setImage('dust')">Dust</button>
    </div>
  </div>

  <div class="panel">
    <h2>🌧️ Radar de precipitació</h2>

    <div class="map-wrapper">
      <iframe
        src="https://www.rainviewer.com/weather-radar-map-live.html"
        title="Radar RainViewer"
        loading="lazy">
      </iframe>
    </div>

    <div class="small">
      Si a Google Sites aquest iframe no es veu bé, el següent pas és fer una versió pròpia amb tiles de RainViewer.
    </div>
  </div>

</div>

<script>
const img = document.getElementById("imgSat");
const video = document.getElementById("videoBox");

let current = "natural";

const urls = {
  natural: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBNatColour_WesternEurope.jpg",
  airmass: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBAirmass_WesternEurope.jpg",
  dust: "https://eumetview.eumetsat.int/static-images/latestImages/EUMETSAT_MSG_RGBDust_WesternEurope.jpg"
};

function showVideo() {
  video.style.display = "block";
  img.style.display = "none";
}

function showImage() {
  video.style.display = "none";
  img.style.display = "block";
  img.src = urls[current] + "?t=" + Date.now();
}

function setImage(type) {
  current = type;
  document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + type).classList.add("active");
  showImage();
}

setInterval(() => {
  if (img.style.display !== "none") {
    img.src = urls[current] + "?t=" + Date.now();
  }
}, 600000);
</script>

</body>
</html>
