<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra</title>

<style>
body {
  margin: 0;
  background: #0b1220;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 10px;
}

h2 {
  margin: 10px 0 14px;
}

.wrapper {
  position: relative;
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius: 10px;
}

.wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
</style>
</head>

<body>
  <div class="container">
    <h2>🌍 Terra en directe</h2>

    <div class="wrapper">
      <iframe
        src="https://www.youtube.com/embed/KkLs5xkL_6Y"
        title="Terra en directe"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
