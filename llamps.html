<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llamps</title>

<style>
body {
  margin: 0;
  background: #0b1220;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 10px;
}

h2 {
  margin: 10px 0 14px;
}

.wrapper {
  position: relative;
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding-bottom: 70%;
  height: 0;
  overflow: hidden;
  border-radius: 10px;
  background: #0b1220;
}

.wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
  transform: scale(1.16);
  transform-origin: center center;
}

@media (max-width: 600px) {
  .wrapper iframe {
    transform: scale(1.10);
  }
}
</style>
</head>

<body>
  <div class="container">
    <h2>⚡ Llamps en directe</h2>

    <div class="wrapper">
      <iframe
        src="https://map.blitzortung.org/index.php?interactive=1&MenuButtonDiv=0#7/41.48/2.32"
        title="Llamps en directe"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
